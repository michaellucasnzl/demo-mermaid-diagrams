services:
  db:
    image: postgres:16-alpine
    container_name: bookcatalog-db
    environment:
      POSTGRES_DB: bookcatalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookcatalog"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./src
      dockerfile: BookCatalog.Presentation/BookCatalog.Presentation.Api/Dockerfile
    container_name: bookcatalog-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=bookcatalog;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
